<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Content import flow from Next.js form to Optimizely CMS">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#052116"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>

  <rect x="30" y="140" width="150" height="100" fill="#F0F4E8" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="105" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">User</text>
  <text x="105" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">/import form</text>
  <text x="105" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">page name</text>

  <line x1="180" y1="190" x2="220" y2="190" stroke="#052116" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="120" width="170" height="140" fill="#F0F4E8" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="315" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">Server Action</text>
  <text x="315" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">app/import/actions.ts</text>
  <text x="315" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">createPocChildPage()</text>

  <line x1="400" y1="190" x2="440" y2="190" stroke="#052116" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="450" y="130" width="180" height="120" fill="#B5FF3D" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="540" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">OAuth token</text>
  <text x="540" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">POST api.cms.optimizely.com</text>
  <text x="540" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">/oauth/token</text>

  <line x1="630" y1="190" x2="670" y2="190" stroke="#052116" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="680" y="110" width="190" height="160" fill="#F0F4E8" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="775" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">Create page</text>
  <text x="775" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">POST /v1/content</text>
  <text x="775" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">type: poc_page_type</text>
  <text x="775" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">container: /poc parent</text>
  <text x="775" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">Title + SeoSettings</text>

  <line x1="870" y1="190" x2="910" y2="190" stroke="#052116" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="920" y="130" width="120" height="120" fill="#B5FF3D" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="980" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">Publish</text>
  <text x="980" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">POST :publish</text>

  <line x1="1040" y1="190" x2="1070" y2="190" stroke="#052116" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="1080" y="140" width="100" height="100" fill="#F0F4E8" stroke="#052116" stroke-width="2" rx="12"/>
  <text x="1130" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#052116">CMS</text>
  <text x="1130" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">child page</text>

  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B6A5A">Credentials stay server-side in .env.local</text>
</svg>
